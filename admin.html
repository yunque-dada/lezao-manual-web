<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐造内部培训 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B35;
            --secondary: #2E4057;
            --accent: #048A81;
            --light: #f5f5f5;
            --dark: #333;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: var(--light);
            color: var(--dark);
        }
        .header {
            background: var(--secondary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 1rem;
        }
        .header .btn:hover { opacity: 0.9; }
        .header .btn.secondary { background: #666; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* 登录页面 */
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }
        .login-box h2 { margin-bottom: 20px; color: var(--secondary); }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        /* 课程标签 */
        .course-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .course-tab {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .course-tab.active {
            background: var(--primary);
            color: white;
        }
        
        /* 内容区块 */
        .section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .section h3 {
            color: var(--secondary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }
        
        /* 表单项 */
        .qa-item {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .qa-item label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary);
        }
        .qa-item textarea, .qa-item input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .qa-item textarea { min-height: 60px; resize: vertical; }
        
        /* 价格网格 */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .price-item {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
        }
        .price-item label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .price-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        
        .hidden { display: none !important; }
        
        /* 消息提示 */
        .msg {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .msg.success { background: #d4edda; color: #155724; display: block; }
        .msg.error { background: #f8d7da; color: #721c24; display: block; }
        
        .preview-link {
            display: inline-block;
            margin-left: 20px;
            color: var(--primary);
            text-decoration: none;
        }
        .preview-link:hover { text-decoration: underline; }
        
        /* 添加/删除按钮 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .btn-small {
            padding: 6px 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-small.danger {
            background: #dc3545;
        }
        
        /* 主题选择器 */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .theme-option {
            cursor: pointer;
        }
        .theme-option input {
            display: none;
        }
        .theme-preview {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 3px solid transparent;
            transition: all 0.3s;
            font-weight: 600;
        }
        .theme-preview.orange {
            background: linear-gradient(135deg, #FF6B35, #FF8F66);
            color: white;
        }
        .theme-preview.green {
            background: linear-gradient(135deg, #10B981, #34D399);
            color: white;
        }
        .theme-preview.blue {
            background: linear-gradient(135deg, #3B82F6, #60A5FA);
            color: white;
        }
        .theme-preview.purple {
            background: linear-gradient(135deg, #8B5CF6, #A78BFA);
            color: white;
        }
        .theme-preview.pink {
            background: linear-gradient(135deg, #F472B6, #F9A8D4);
            color: white;
        }
        .theme-option input:checked + .theme-preview {
            border-color: #000;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 引入数据文件 -->
    <script src="data.js"></script>
    
    <script>
        // 默认密码
        const DEFAULT_PASSWORD = 'lezao2026';
        
        // 当前编辑的课程数据
        let currentData = null;
        
        // 初始化
        function init() {
            // 复制数据避免直接修改
            currentData = JSON.parse(JSON.stringify(siteData));
            
            // 加载各课程数据到表单
            loadCourseData('scratch');
            loadCourseData('python');
            loadCourseData('lego-duplo');
            loadCourseData('lego-wedo');
            loadSettings();
        }

        // 加载课程数据到表单
        function loadCourseData(courseId) {
            const course = currentData.courses[courseId];
            if (!course) return;
            
            document.getElementById(courseId + '-title').value = course.title || '';
            document.getElementById(courseId + '-subtitle').value = course.subtitle || '';
            document.getElementById(courseId + '-desc').value = course.desc || '';
            
            // 加载价格
            if (course.prices) {
                course.prices.forEach((price, i) => {
                    const el = document.getElementById(courseId + '-price' + i);
                    if (el) el.value = price;
                });
            }
            
            // 加载话术
            if (course.speech) {
                document.getElementById(courseId + '-speech-welcome').value = course.speech.welcome || '';
                document.getElementById(courseId + '-speech-intro').value = course.speech.intro || '';
                document.getElementById(courseId + '-speech-objection').value = course.speech.objection || '';
            }
            
            // 渲染Q&A
            renderQA(courseId);
        }

        // 加载网站设置
        function loadSettings() {
            document.getElementById('site-title').value = currentData.site.title || '';
            document.getElementById('org-name').value = currentData.site.orgName || '';
            document.getElementById('contact').value = currentData.site.contact || '';
            
            // 加载主题设置
            const theme = currentData.site.theme || 'orange';
            document.querySelector(`input[name="theme"][value="${theme}"]`).checked = true;
        }

        // 检查密码
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const stored = localStorage.getItem('lezao_password') || DEFAULT_PASSWORD;
            if (input === stored) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminHeader').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'block';
                init();
            } else {
                alert('密码错误！');
            }
        }

        // 退出登录
        function logout() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminHeader').style.display = 'none';
            document.getElementById('adminContent').style.display = 'none';
        }

        // 切换课程
        function switchCourse(course) {
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.course-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('course-' + course).classList.remove('hidden');
        }

        // 渲染Q&A列表
        function renderQA(courseId) {
            const course = currentData.courses[courseId];
            if (!course || !course.qa) return;
            
            const list = document.getElementById(courseId + '-qa-list');
            if (!list) return;
            
            list.innerHTML = course.qa.map((item, i) => `
                <div class="qa-item" id="${courseId}-qa-${i}">
                    <label>问题 ${i+1} <button class="btn-small danger" style="float:right;margin-left:10px;" onclick="removeQA('${courseId}', ${i})">删除</button></label>
                    <input type="text" value="${escapeHtml(item.q)}" onchange="updateQA('${courseId}', ${i}, 'q', this.value)">
                    <label style="margin-top:10px;">答案 ${i+1}</label>
                    <textarea onchange="updateQA('${courseId}', ${i}, 'a', this.value)">${escapeHtml(item.a)}</textarea>
                </div>
            `).join('');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 更新Q&A
        function updateQA(courseId, index, field, value) {
            if (!currentData.courses[courseId].qa) {
                currentData.courses[courseId].qa = [];
            }
            if (!currentData.courses[courseId].qa[index]) {
                currentData.courses[courseId].qa[index] = {q: '', a: ''};
            }
            currentData.courses[courseId].qa[index][field] = value;
        }

        // 添加Q&A
        function addQA(courseId) {
            if (!currentData.courses[courseId].qa) {
                currentData.courses[courseId].qa = [];
            }
            currentData.courses[courseId].qa.push({q: '新问题', a: '新答案'});
            renderQA(courseId);
        }

        // 删除Q&A
        function removeQA(courseId, index) {
            if (currentData.courses[courseId].qa) {
                currentData.courses[courseId].qa.splice(index, 1);
                renderQA(courseId);
            }
        }

        // 收集表单数据
        function collectFormData() {
            const courses = ['scratch', 'python', 'lego-duplo', 'lego-wedo'];
            
            courses.forEach(courseId => {
                const course = currentData.courses[courseId];
                if (!course) return;
                
                course.title = document.getElementById(courseId + '-title').value;
                course.subtitle = document.getElementById(courseId + '-subtitle').value;
                course.desc = document.getElementById(courseId + '-desc').value;
                
                // 收集价格
                const prices = [];
                for (let i = 0; i < 4; i++) {
                    const el = document.getElementById(courseId + '-price' + i);
                    if (el && el.value) prices.push(el.value);
                }
                course.prices = prices;
                
                // 收集话术
                course.speech = {
                    welcome: document.getElementById(courseId + '-speech-welcome').value,
                    intro: document.getElementById(courseId + '-speech-intro').value,
                    objection: document.getElementById(courseId + '-speech-objection').value
                };
            });
            
            // 网站设置
            currentData.site.title = document.getElementById('site-title').value;
            currentData.site.orgName = document.getElementById('org-name').value;
            currentData.site.contact = document.getElementById('contact').value;
            
            // 保存主题
            const themeEl = document.querySelector('input[name="theme"]:checked');
            if (themeEl) {
                currentData.site.theme = themeEl.value;
            }
            
            // 密码修改
            const newPass = document.getElementById('new-password').value;
            if (newPass) {
                localStorage.setItem('lezao_password', newPass);
            }
        }

        // 保存数据（保存到浏览器 + 生成下载）
        function saveData() {
            collectFormData();
            
            // 保存到 localStorage
            localStorage.setItem('lezao_site_data', JSON.stringify(currentData));
            
            // 生成 data.js 内容
            const content = '// 乐造网站数据\n// 修改这里可以更新网站内容\n\nvar siteData = ' + 
                JSON.stringify(currentData, null, 4) + ';\n';
            
            // 创建下载链接
            const blob = new Blob([content], {type: 'text/javascript'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.js';
            a.click();
            URL.revokeObjectURL(url);
            
            showMsg('success', '✅ 已保存！请下载 data.js，上传到 GitHub 即可上线。');
        }

        // 显示消息
        function showMsg(type, text) {
            const msg = document.getElementById('msgBox');
            msg.className = 'msg ' + type;
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
